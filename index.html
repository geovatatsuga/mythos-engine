<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYTHOSENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Remapped base colors to Light Theme (Academic Luxury)
              background: '#F9F8F4', // Paper
              surface: '#FFFFFF',    // White
              
              primary: '#C5A059',    // Nobel Gold
              'primary-hover': '#B08D45',
              
              secondary: '#1a1a1a',  // Stone Dark (used for heavy accents)
              'secondary-hover': '#000000',
              
              text: '#1a1a1a',       // Stone
              'text-secondary': '#57534e', // Stone Light
              
              // Explicit Palette names if needed
              paper: '#F9F8F4',
              stone: {
                DEFAULT: '#1a1a1a',
                light: '#57534e',
                lighter: '#d6d3d1',
                dark: '#0c0a09',
              },
              nobel: '#C5A059',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            animation: {
              'spin-slow': 'spin 20s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'shimmer': 'shimmer 1.5s infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shimmer: {
                '100%': { transform: 'translateX(100%)' },
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom",
    "openai": "https://esm.sh/openai@4.104.0?target=es2022"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-background text-text font-sans antialiased selection:bg-nobel selection:text-white relative">
    <svg class="pointer-events-none fixed inset-0 z-50 h-full w-full opacity-[0.03]" xmlns="http://www.w3.org/2000/svg">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
    </svg>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
